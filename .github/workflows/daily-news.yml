name: Daily news refresh

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch:      # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wake service and trigger news refresh
        run: |
          curl -sf --retry 3 --retry-delay 30 \
            -X POST \
            -H "X-Admin-Key: ${{ secrets.ADMIN_KEY }}" \
            "${{ secrets.RENDER_URL }}/admin/refresh-news"
