name: Weekly trials & grants digest

# Refreshes trials + grants and emails the weekly digests — entirely on the
# GitHub runner. Why not via Render like the daily news digest? The ingest needs
# the ~316MB DB in memory and free-tier Render (512MB) would OOM. The runner has
# 7GB, so it ingests here and persists the DB via actions/cache (no Git LFS
# bandwidth cost). The send runs on the runner too, against the freshly-ingested
# DB — hitting the Render endpoint would email stale, deploy-baked data instead.
on:
  schedule:
    - cron: '0 7 * * 1'   # Mondays 07:00 UTC (offset from the 06:00 daily news)
  workflow_dispatch:
    inputs:
      skip_ingest:
        description: "Skip ingest, just send from the cached DB"
        type: boolean
        default: false

jobs:
  ingest-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4          # no lfs: avoids LFS bandwidth; DB comes from cache

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Rolling cache: restore the newest prior DB, save a fresh one each run
      # under a unique key. Caches unused for 7 days are evicted; the weekly
      # restore keeps the chain warm.
      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: backend/data/aicure.db
          key: aicure-db-${{ github.run_id }}
          restore-keys: |
            aicure-db-

      - name: Start fresh on cache miss (drop missing/placeholder DB)
        run: |
          db=backend/data/aicure.db
          sz=$( [ -f "$db" ] && stat -c%s "$db" || echo 0 )
          if [ "$sz" -lt 1000000 ]; then
            echo "No usable cached DB ($sz bytes) — pullers will build a fresh one."
            rm -f "$db"
          else
            echo "Restored cached DB: $(du -h "$db" | cut -f1)"
          fi

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Ingest trials + grants
        if: ${{ github.event.inputs.skip_ingest != 'true' }}
        working-directory: backend
        run: |
          python reingest_registries.py
          python reingest_grants.py --force

      - name: Build & send weekly trials + grants digests
        working-directory: backend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AICURE_EMAIL_FROM: ${{ vars.AICURE_EMAIL_FROM }}
          AICURE_EMAIL_TO: ${{ vars.AICURE_EMAIL_TO }}
        run: |
          python emailer.py trials
          python emailer.py grants
