# Render configuration — single web service hosting both the FastAPI backend
# and the built React frontend. Free tier.
#
# How it works:
#   - buildCommand installs Node deps, builds the React app, installs Python
#     deps, then runs the ingest pipeline so the SQLite DB is populated.
#   - startCommand runs uvicorn. FastAPI serves API routes AND the SPA from
#     frontend/dist (see the StaticFiles mount at the bottom of backend/api.py).
#
# Caveats:
#   - Free tier has no persistent disk, so the DB is rebuilt by `ingest.py`
#     on every deploy. Build takes ~5 min.
#   - Free service sleeps after 15 min idle → ~30s cold start on first hit.
services:
  - type: web
    name: aicure-poc
    runtime: python
    plan: free
    region: oregon
    buildCommand: |
      set -e
      cd frontend
      npm install
      npm run build
      cd ../backend
      pip install -r requirements.txt
      python3 ingest.py
    startCommand: cd backend && uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
