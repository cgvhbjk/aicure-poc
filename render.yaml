# SUPERSEDED (2026-06): production is migrating to AWS ECS Fargate + EFS — see
# DEPLOY.md. This file documents the OLD Render free-tier service and is kept for
# reference until the cutover decommissions Render.
#
# Render configuration — single web service hosting both the FastAPI backend
# and the built React frontend. Free tier.
#
# Uses Docker to guarantee Node+Python coexist (Render's native Python runtime
# doesn't reliably include npm). See Dockerfile for build steps.
#
# Caveats:
#   - Free tier has no persistent disk, so the DB is rebuilt by `ingest.py`
#     on every deploy. Build takes ~5 min.
#   - Free service sleeps after 15 min idle → ~30s cold start on first hit.
services:
  - type: web
    name: aicure-poc
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    envVars:
      # NO login gate — run the POC open. Without this (and with AICURE_APP_PASSWORD
      # unset) the app refuses to boot (see backend/api.py). Set AICURE_APP_PASSWORD
      # in the dashboard instead to require a login.
      - key: AICURE_ALLOW_OPEN
        value: "1"
      # Secret: value is NOT in git. Enter it in the Render dashboard
      # (Service → Environment). `sync: false` tells Render this blueprint
      # only declares the var; the value is managed in the dashboard.
      - key: RESEND_API_KEY
        sync: false
      # Verified Resend sender (root domain benjaminhelfand.com). Not secret,
      # so the value is committed here for reproducibility.
      - key: AICURE_EMAIL_FROM
        value: "AiCure Digest <digest@benjaminhelfand.com>"
      # Recipient list — operational choice, set per-environment in the
      # dashboard (defaults to dufffires@gmail.com in code if unset).
      - key: AICURE_EMAIL_TO
        sync: false
      # Secret: guards the /admin/* endpoints (incl. the digest trigger the
      # daily-news workflow calls). MUST match the ADMIN_KEY GitHub secret.
      # Without it set, the hardened endpoints fail closed (403).
      - key: ADMIN_KEY
        sync: false
