# Render configuration — single web service hosting both the FastAPI backend
# and the built React frontend. Free tier.
#
# Uses Docker to guarantee Node+Python coexist (Render's native Python runtime
# doesn't reliably include npm). See Dockerfile for build steps.
#
# Caveats:
#   - Free tier has no persistent disk, so the DB is rebuilt by `ingest.py`
#     on every deploy. Build takes ~5 min.
#   - Free service sleeps after 15 min idle → ~30s cold start on first hit.
services:
  - type: web
    name: aicure-poc
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
